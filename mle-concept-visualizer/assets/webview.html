<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MLE Concept Visualizer</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0d1117;
        --card: #161b22;
        --card-2: #1c2430;
        --text: #e6edf3;
        --muted: #9fb0c3;
        --border: rgba(255, 255, 255, 0.1);
        --blue: #58a6ff;
        --green: #2ea043;
        --gold: #f2cc60;
        --red: #ff7b72;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(88, 166, 255, 0.22), transparent 30%),
          radial-gradient(circle at top right, rgba(46, 160, 67, 0.14), transparent 24%),
          var(--bg);
        color: var(--text);
      }

      .app {
        max-width: 980px;
        margin: 0 auto;
        padding: 18px;
        display: grid;
        gap: 16px;
      }

      .hero,
      .card {
        background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 18px;
      }

      .hero {
        display: grid;
        gap: 12px;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      h1, h2, h3, p {
        margin: 0;
      }

      h1 {
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.05;
      }

      .muted {
        color: var(--muted);
        line-height: 1.5;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(88,166,255,0.3);
        background: rgba(88,166,255,0.12);
        color: #b9d8ff;
        font-size: 12px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 16px;
      }

      .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .stage-list,
      .bullet-list {
        display: grid;
        gap: 10px;
      }

      .stage {
        padding: 14px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.02);
      }

      .stage-index {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 999px;
        background: rgba(88,166,255,0.2);
        font-weight: 700;
        margin-bottom: 10px;
      }

      .metric {
        padding: 14px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.02);
      }

      .metric-label {
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .metric-value {
        margin-top: 8px;
        font-size: 22px;
        font-weight: 700;
      }

      .viz-box {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      }

      .token-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .token {
        padding: 10px 12px;
        min-width: 70px;
        text-align: center;
        border-radius: 14px;
        background: rgba(88,166,255,0.12);
        border: 1px solid rgba(88,166,255,0.25);
      }

      .heatmap {
        display: grid;
        gap: 6px;
      }

      .heatmap-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
      }

      .cell {
        border-radius: 12px;
        padding: 12px 8px;
        font-size: 12px;
        text-align: center;
      }

      .bar-group {
        display: grid;
        gap: 10px;
      }

      .bar-label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 13px;
        color: var(--muted);
      }

      .bar-track {
        height: 12px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255,255,255,0.08);
      }

      .bar-fill {
        height: 100%;
        border-radius: 999px;
      }

      ul {
        margin: 0;
        padding-left: 18px;
      }

      li {
        margin: 8px 0;
        color: var(--muted);
      }

      .callout {
        padding: 14px;
        border-radius: 16px;
        border: 1px solid rgba(242,204,96,0.3);
        background: rgba(242,204,96,0.08);
        color: #f9df89;
      }

      @media (max-width: 820px) {
        .grid-2,
        .grid-3 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      function getParam(name) {
        try {
          var params = new URLSearchParams(window.location.search);
          return params.get(name) || "";
        } catch (e) {
          return "";
        }
      }

      function safeDecode(value) {
        try {
          return decodeURIComponent(value);
        } catch (e) {
          return value;
        }
      }

      var concept = safeDecode(getParam("concept")) || "self-attention";
      var focus = safeDecode(getParam("focus")) || "interview framing";

      var PRESETS = {
        "self-attention": {
          title: "Self-Attention",
          subtitle: "A token compares itself against all tokens, then mixes context back into the output.",
          bullets: [
            "Every token creates query, key, and value vectors.",
            "Attention scores tell us which tokens matter to the current token.",
            "The bottleneck is the full attention matrix growing quadratically with sequence length."
          ],
          stages: [
            { title: "Problem", body: "A token needs global context, not just the previous hidden state." },
            { title: "Naive flow", body: "Compute Q, K, and V, compare the query token against all keys, normalize the scores, then mix values." },
            { title: "What breaks at scale", body: "The attention matrix is O(n^2) in sequence length, which stresses memory and latency." },
            { title: "Interviewer framing", body: "Explain score, softmax, weighted sum, and why the matrix becomes the bottleneck." }
          ],
          metrics: [
            { label: "Math / scaling", value: "O(n^2)" },
            { label: "Main bottleneck", value: "memory" },
            { label: "Interview hook", value: "global context" }
          ],
          viz: { type: "self-attention" }
        },
        "multi-head-attention": {
          title: "Multi-Head Attention",
          subtitle: "Several attention heads learn different relationships in parallel before merging.",
          bullets: [
            "Different heads can focus on different relationships in the same sequence.",
            "The value is multiple representation subspaces, not just more compute.",
            "A strong answer explains the per-head view and the merge step."
          ],
          stages: [
            { title: "Problem", body: "One attention pattern may miss other useful relationships in a sentence." },
            { title: "Naive flow", body: "Project into multiple heads, attend separately, concatenate the outputs, then project again." },
            { title: "What breaks at scale", body: "More heads add compute and memory pressure, so head count and width need balancing." },
            { title: "Interviewer framing", body: "Stress specialized subspaces and parallel relationships, not just 'more attention'." }
          ],
          metrics: [
            { label: "Math / scaling", value: "O(h·n^2)" },
            { label: "Main bottleneck", value: "compute + memory" },
            { label: "Interview hook", value: "parallel views" }
          ],
          viz: { type: "multi-head-attention" }
        },
        "flash-attention": {
          title: "FlashAttention",
          subtitle: "An IO-aware implementation of attention that avoids materializing large intermediates in expensive memory.",
          bullets: [
            "FlashAttention does not change transformer semantics; it changes how the computation is scheduled.",
            "The big win is reduced memory traffic, not a new attention formula.",
            "Interview answer: tiled exact attention, on-chip blocks, fewer HBM reads and writes."
          ],
          stages: [
            { title: "Problem", body: "Naive attention writes giant intermediate matrices to memory and pays repeated IO cost." },
            { title: "Naive flow", body: "Materialize QK^T, materialize the softmax, then multiply by V." },
            { title: "What changed", body: "Process attention in tiles that fit on-chip and keep running normalization statistics." },
            { title: "Interviewer framing", body: "Lead with IO bottleneck and memory movement before talking about speed." }
          ],
          metrics: [
            { label: "Math / scaling", value: "O(n^2) math" },
            { label: "Main bottleneck", value: "IO / bandwidth" },
            { label: "Interview hook", value: "blockwise exact attention" }
          ],
          viz: { type: "flash-attention" }
        },
        "kv-cache": {
          title: "KV Cache",
          subtitle: "Autoregressive decoding stores old keys and values so each new token adds incremental work instead of recomputing the full prefix.",
          bullets: [
            "Without a KV cache, decoding keeps recomputing old key/value states.",
            "A KV cache reduces per-token decode compute but increases memory footprint.",
            "Interview answer: lower latency per new token, higher memory per active sequence."
          ],
          stages: [
            { title: "Problem", body: "Autoregressive generation revisits the entire prefix at every step." },
            { title: "Naive flow", body: "Recompute keys and values for the whole context on each decode step." },
            { title: "What changed", body: "Store old keys and values once, then append only the newest token's state." },
            { title: "Interviewer framing", body: "Say the tradeoff explicitly: better decode speed, worse memory pressure." }
          ],
          metrics: [
            { label: "Math / scaling", value: "append-only decode" },
            { label: "Main bottleneck", value: "memory footprint" },
            { label: "Interview hook", value: "latency vs memory" }
          ],
          viz: { type: "kv-cache" }
        }
      };

      function buildGenericPreset(name, currentFocus) {
        return {
          title: name,
          subtitle: "General interview visualization for " + name + ".",
          bullets: [
            "Start with the problem the concept is solving.",
            "Explain the naive version before the optimized one.",
            "Highlight the main tradeoff in latency, memory, quality, or scale."
          ],
          stages: [
            { title: "Problem", body: "What bottleneck or missing capability does " + name + " address?" },
            { title: "Naive flow", body: "Describe the simplest working version first." },
            { title: "What breaks at scale", body: "Call out the main pressure: memory, latency, compute, or reliability." },
            { title: "Interviewer framing", body: "Tie the concept back to tradeoffs, production constraints, and " + currentFocus + "." }
          ],
          metrics: [
            { label: "Focus", value: currentFocus || "intuition" },
            { label: "Mode", value: "generic" },
            { label: "Interview hook", value: "tradeoffs" }
          ],
          viz: { type: "generic" }
        };
      }

      var preset = PRESETS[concept] || buildGenericPreset(concept, focus);
      var title = preset.title;
      var subtitle = preset.subtitle;

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderStages(stages) {
        return stages.map(function(stage, index) {
          return (
            '<div class="stage">' +
              '<div class="stage-index">' + (index + 1) + "</div>" +
              "<h3>" + escapeHtml(stage.title) + "</h3>" +
              '<p class="muted" style="margin-top:10px;">' + escapeHtml(stage.body) + "</p>" +
            "</div>"
          );
        }).join("");
      }

      function renderBullets(items) {
        return "<ul>" + items.map(function(item) {
          return "<li>" + escapeHtml(item) + "</li>";
        }).join("") + "</ul>";
      }

      function renderMetrics(metrics) {
        return metrics.map(function(metric) {
          return (
            '<div class="metric">' +
              '<div class="metric-label">' + escapeHtml(metric.label) + "</div>" +
              '<div class="metric-value">' + escapeHtml(metric.value) + "</div>" +
            "</div>"
          );
        }).join("");
      }

      function renderSelfAttention() {
        var rows = [
          [0.12, 0.21, 0.28, 0.39],
          [0.15, 0.18, 0.44, 0.23],
          [0.08, 0.11, 0.16, 0.65],
          [0.31, 0.19, 0.23, 0.27]
        ];
        var heatmap = rows.map(function(row) {
          return '<div class="heatmap-row">' + row.map(function(value) {
            return '<div class="cell" style="background:rgba(88,166,255,' + (0.15 + value * 0.75) + ');">' + value.toFixed(2) + "</div>";
          }).join("") + "</div>";
        }).join("");

        return (
          '<div class="viz-box">' +
            '<div class="token-row">' +
              '<div class="token">The</div>' +
              '<div class="token">model</div>' +
              '<div class="token">learns</div>' +
              '<div class="token">context</div>' +
            "</div>" +
            '<div class="heatmap">' + heatmap + "</div>" +
            '<p class="muted" style="margin-top:12px;">Toy attention matrix: each row is one query token attending across the whole sequence.</p>' +
          "</div>"
        );
      }

      function renderFlashAttention() {
        return (
          '<div class="viz-box">' +
            '<div class="bar-group">' +
              '<div><div class="bar-label"><span>Naive attention memory traffic</span><span>100 units</span></div><div class="bar-track"><div class="bar-fill" style="width:100%;background:linear-gradient(90deg,var(--red),var(--gold));"></div></div></div>' +
              '<div><div class="bar-label"><span>Blockwise FlashAttention traffic</span><span>28 units</span></div><div class="bar-track"><div class="bar-fill" style="width:28%;background:linear-gradient(90deg,var(--green),var(--blue));"></div></div></div>' +
            "</div>" +
            '<div class="callout" style="margin-top:14px;">Interview takeaway: FlashAttention keeps exact attention math but cuts expensive memory movement by processing tiles on-chip.</div>' +
          "</div>"
        );
      }

      function renderKvCache() {
        return (
          '<div class="viz-box">' +
            '<div class="bar-group">' +
              '<div><div class="bar-label"><span>Decode step 1</span><span>naive 1 vs cached 1</span></div><div class="bar-track"><div class="bar-fill" style="width:20%;background:linear-gradient(90deg,var(--red),var(--gold));"></div></div></div>' +
              '<div><div class="bar-label"><span>Decode step 2</span><span>naive 4 vs cached 2</span></div><div class="bar-track"><div class="bar-fill" style="width:42%;background:linear-gradient(90deg,var(--red),var(--gold));"></div></div></div>' +
              '<div><div class="bar-label"><span>Decode step 3</span><span>naive 9 vs cached 3</span></div><div class="bar-track"><div class="bar-fill" style="width:65%;background:linear-gradient(90deg,var(--red),var(--gold));"></div></div></div>' +
              '<div><div class="bar-label"><span>Decode step 4</span><span>naive 16 vs cached 4</span></div><div class="bar-track"><div class="bar-fill" style="width:100%;background:linear-gradient(90deg,var(--red),var(--gold));"></div></div></div>' +
            "</div>" +
            '<p class="muted" style="margin-top:12px;">Without a KV cache, old key/value work keeps getting recomputed. With a cache, new tokens append incremental state.</p>' +
          "</div>"
        );
      }

      function renderHeads() {
        return (
          '<div class="viz-box">' +
            '<div class="grid-3">' +
              '<div class="metric"><div class="metric-label">Head 1</div><div class="metric-value" style="font-size:18px;">local syntax</div></div>' +
              '<div class="metric"><div class="metric-label">Head 2</div><div class="metric-value" style="font-size:18px;">coreference</div></div>' +
              '<div class="metric"><div class="metric-label">Head 3</div><div class="metric-value" style="font-size:18px;">topic relevance</div></div>' +
            "</div>" +
            '<p class="muted" style="margin-top:12px;">Different heads can focus on different relationships in parallel before merging.</p>' +
          "</div>"
        );
      }

      function renderGeneric() {
        return (
          '<div class="viz-box">' +
            '<div class="callout">Generic visualization mode: the concept did not match a specialized template, so this skill is showing the reusable interview breakdown.</div>' +
            '<div class="stage-list" style="margin-top:14px;">' +
              '<div class="stage"><div class="stage-index">1</div><h3>What problem does it solve?</h3><p class="muted" style="margin-top:10px;">State the bottleneck or missing capability first.</p></div>' +
              '<div class="stage"><div class="stage-index">2</div><h3>How does the naive version work?</h3><p class="muted" style="margin-top:10px;">Give the simplest mental model before the optimization.</p></div>' +
              '<div class="stage"><div class="stage-index">3</div><h3>What breaks at scale?</h3><p class="muted" style="margin-top:10px;">Call out memory, latency, quality, or reliability pressure.</p></div>' +
              '<div class="stage"><div class="stage-index">4</div><h3>What changed in the optimized design?</h3><p class="muted" style="margin-top:10px;">Explain the tradeoff that makes the system practical.</p></div>' +
            "</div>" +
          "</div>"
        );
      }

      function renderViz(type) {
        if (type === "self-attention") return renderSelfAttention();
        if (type === "multi-head-attention") return renderHeads();
        if (type === "flash-attention") return renderFlashAttention();
        if (type === "kv-cache") return renderKvCache();
        return renderGeneric();
      }

      var stages = preset.stages || [];
      var bullets = preset.bullets || [];
      var metrics = preset.metrics || [];
      var vizType = preset.viz && preset.viz.type ? preset.viz.type : "generic";

      document.getElementById("root").innerHTML =
        '<div class="app">' +
          '<section class="hero">' +
            '<div class="eyebrow">SynaptiQ x AI Edge Gallery</div>' +
            "<h1>" + escapeHtml(title) + "</h1>" +
            '<p class="muted">' + escapeHtml(subtitle) + "</p>" +
            '<div class="chip-row">' +
              '<span class="chip">Concept: ' + escapeHtml(concept) + "</span>" +
              '<span class="chip">Focus: ' + escapeHtml(focus) + "</span>" +
              '<span class="chip">Mode: ' + escapeHtml(vizType) + "</span>" +
            "</div>" +
          "</section>" +
          '<section class="grid-2">' +
            '<div class="card">' +
              "<h2>4-panel interview mental model</h2>" +
              '<p class="muted" style="margin-top:10px;">Use this structure to explain the concept clearly under interview pressure.</p>' +
              '<div class="stage-list" style="margin-top:16px;">' + renderStages(stages) + "</div>" +
              '<div style="margin-top:16px;">' + renderViz(vizType) + "</div>" +
            "</div>" +
            '<div class="card">' +
              "<h2>What to say in an interview</h2>" +
              '<div class="bullet-list" style="margin-top:12px;">' + renderBullets(bullets) + "</div>" +
              '<div class="grid-3" style="margin-top:16px;">' + renderMetrics(metrics) + "</div>" +
              '<div class="callout" style="margin-top:16px;">Best practice for visualization: show the naive version, the bottleneck, and the tradeoff that makes the optimized design work.</div>' +
            "</div>" +
          "</section>" +
        "</div>";
    </script>
  </body>
</html>
